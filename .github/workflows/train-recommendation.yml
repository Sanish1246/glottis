name: Train recommendation model

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Export training data
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: node scripts/exportRecommendationData.js

      - name: Train model
        env:
          TRAIN_RANDOM_STATE: ${{ secrets.TRAIN_RANDOM_STATE }}
        run: node scripts/modelTraining.js

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: recommendation-model
          path: |
            data/recommendation-model.json
            data/eval-metrics.json
            
      - name: Commit and push model
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/recommendation-model.json data/eval-metrics.json
          git diff --quiet || git commit -m "Weekly update recommendation model"
          git push origin main
